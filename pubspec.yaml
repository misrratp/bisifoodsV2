name: bisifoods
description: Delivery de comida artesanal - Felipe Carrillo Puerto
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # Navegación
  go_router: ^12.1.3

  # Estado
  provider: ^6.1.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Mapas y ubicación
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Pagos
  mercadopago_sdk: ^1.0.2

  # Utilidades
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/